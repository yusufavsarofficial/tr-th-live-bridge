<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Nova</title>
  <desc id="desc">AYFSOFT Nova chat and call app icon.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1014" />
      <stop offset="1" stop-color="#071217" />
    </linearGradient>
    <linearGradient id="star" x1="24" y1="24" x2="104" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#25f59d" />
      <stop offset=".5" stop-color="#12c7d9" />
      <stop offset="1" stop-color="#3158ff" />
    </linearGradient>
    <linearGradient id="burst" x1="64" y1="0" x2="64" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".15" />
