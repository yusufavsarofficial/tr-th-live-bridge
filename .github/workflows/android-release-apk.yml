name: Android Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "android/**"
      - ".github/workflows/android-release-apk.yml"

jobs:
  build_apk:
    name: Build SevgilimChat-release.apk
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: android/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Prebuild Android
        run: npx expo prebuild --platform android --no-install

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --console=plain
        working-directory: android/android

      - name: Prepare artifact
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-release.apk release/SevgilimChat-release.apk
          sha256sum release/SevgilimChat-release.apk > release/SevgilimChat-release.apk.sha256

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SevgilimChat-release.apk
          path: |
            android/release/SevgilimChat-release.apk
            android/release/SevgilimChat-release.apk.sha256
          if-no-files-found: error
