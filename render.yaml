services:
  - type: web
    name: nova-api
    runtime: docker
    plan: starter
    branch: main
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nova-db
          property: connectionString
      - key: DB_PROVIDER
        value: postgresql
      - key: FCM_SERVICE_ACCOUNT_PATH
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: OPENAI_TRANSLATE_MODEL
        value: gpt-4.1-mini
      - key: TRANSLATION_PROVIDER
        value: legacy
      - key: TRANSLATE_TIMEOUT_MS
        value: 7000
      - key: CORS_ORIGIN
        value: "*"
      - key: MAX_ATTACHMENT_BYTES
        value: 4500000
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:nova@ayfsoft.com
      - key: ALLOWED_USERS
        value: "+905514883842,+66642177978"
      - key: RTC_ICE_SERVERS_JSON
        value: '[{"urls":"stun:stun.l.google.com:19302"}]'

databases:
  - name: nova-db
    plan: starter
    databaseType: postgresql
    ipAllowList: []
